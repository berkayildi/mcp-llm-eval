dataset: eval/dataset.json
output_dir: eval/results

models:
  - provider: anthropic
    model: claude-sonnet-4-6
    max_tokens: 2048
    input_cost_per_mtok: 3.0
    output_cost_per_mtok: 15.0
  - provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 2048
    input_cost_per_mtok: 1.0
    output_cost_per_mtok: 5.0
  - provider: openai
    model: gpt-4o-mini
    max_tokens: 2048
    input_cost_per_mtok: 0.15
    output_cost_per_mtok: 0.60
  - provider: google
    model: gemini-2.5-flash
    max_tokens: 2048
    input_cost_per_mtok: 0.15
    output_cost_per_mtok: 0.60
  - provider: google
    model: gemini-2.5-flash-lite
    max_tokens: 2048
    input_cost_per_mtok: 0.075
    output_cost_per_mtok: 0.30

judge:
  provider: openai
  model: gpt-4o-mini
  temperature: 0

# v0.5.0 retrieval/RAG config
corpus: eval/retrieval_corpus.jsonl

retrieval:
  adapter: bm25
  k: 5

thresholds:
  # generation thresholds
  avg_faithfulness: 0.80
  avg_relevance: 0.75
  p95_ttft_ms: 2000
  max_cost_per_query: 0.01
  # retrieval / RAG thresholds
  avg_recall_at_k: 0.70
  avg_precision_at_k: 0.30
  avg_mrr: 0.65
  avg_ndcg_at_k: 0.70
  p95_retrieval_latency_ms: 50
  avg_context_relevance: 0.45
  avg_citation_faithfulness: 0.75
